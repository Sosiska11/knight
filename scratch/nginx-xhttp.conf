# ============================================================================
# nginx config для XHTTP обхода через Yandex CDN
# Заменяет scratch/nginx-default.conf (WS-bridge версия)
#
# Цепочка: Телефон → Yandex CDN (cdn.node-ping-stat.ru) → nginx :80 → Xray :8080
#
# ВАЖНО для XHTTP:
#   - НЕ нужны Upgrade/Connection headers (это не WebSocket)
#   - Xray XHTTP сам терминирует HTTP, nginx только проксирует
#   - X-Real-IP / X-Forwarded-For обязательны — иначе Xray увидит IP nginx (127.0.0.1)
#   - proxy_buffering off — критично для streaming-download (иначе режет трафик)
#   - длинные таймауты для длинных streaming-соединений download
# ============================================================================

# Слушаем :80 — сюда приходит трафик от Yandex CDN (origin по HTTP)
# :443 занят xray (Reality main inbound), поэтому CDN терминирует TLS на своей стороне
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Camouflage: корень сайта отдаёт статическую страницу
    location / {
        root /var/www/html;
        index index.html index.htm index.nginx-debian.html;
    }

    # ОСНОВНОЙ путь XHTTP (download-streaming + upload GET'ы от клиентов)
    location /api/uploadFile {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Передаём реальный IP клиента (CDN отдаёт свой IP в этих заголовках)
        proxy_set_header Host cdn.node-ping-stat.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # КРИТИЧНО для XHTTP (отключаем буферизацию)
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Connection "";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Отключаем буферизацию и кэширование на CDN (Gcore/Yandex CDN)
        add_header X-Accel-Buffering "no" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;

        client_max_body_size 2m;
    }

    # Camouflage: имитация статических ассетов (оставлено для маскировки)
    location /static/js/main.js {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Connection "";
        proxy_set_header Host cdn.node-ping-stat.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering "no" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    location /static/css/main.css {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Connection "";
        proxy_set_header Host cdn.node-ping-stat.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering "no" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    # Debug endpoint для проверки прохождения заголовков
    location /knight-xhttp-debug {
        add_header X-Debug-Host "$http_host" always;
        add_header X-Debug-RealIP "$remote_addr" always;
        add_header X-Debug-Forwarded "$proxy_add_x_forwarded_for" always;
        add_header X-Debug-Method "$request_method" always;
        return 200 "OK";
    }
}
